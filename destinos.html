      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html"> Turismo </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#menu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Inicio</a>
            </li>

            <li class="nav-item">
              <a class="nav-link active" href="destinos.html">Destinos</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="contacto.html">Contacto</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <section class="container mt-5">
      <h1 class="text-center mb-4">Destinos Turísticos</h1>
    </section>

    <section class="container text-center mb-5">
      <button class="btn btn-primary filtro" data-categoria="todos">
        Todos
      </button>

      <button class="btn btn-success filtro" data-categoria="naturaleza">
        Naturaleza
      </button>

      <button class="btn btn-warning filtro" data-categoria="cultura">
        Cultura
      </button>
    </section>

    <section class="container">
      <div class="row">
        <div class="col-md-4 mb-4 destino naturaleza">
          <div class="card">
            <img src="img/salinas.jpg" class="card-img-top" />

            <div class="card-body">
              <h5 class="card-title">Salinas Grandes</h5>

              <p>Paisajes naturales impresionantes.</p>
            </div>
          </div>
        </div>

        <div class="col-md-4 mb-4 destino cultura">
          <div class="card">
            <img src="img/tilcara.png" class="card-img-top" />

            <div class="card-body">
              <h5 class="card-title">Tilcara</h5>

              <p>Cultura e historia del norte.</p>
            </div>
          </div>
        </div>

        <div class="col-md-4 mb-4 destino naturaleza">
          <div class="card">
            <img src="img/cerrosietecolores.jpg" class="card-img-top" />

            <div class="card-body">
              <h5 class="card-title">Purmamarca</h5>

              <p>Cerro de los siete colores.</p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="container mt-5 mb-5">
      <h2 class="text-center mb-4">Precios de viajes</h2>

      <div class="table-responsive">
        <table class="table table-bordered table-hover">
          <thead class="table-dark">
            <tr>
              <th>Destino</th>
              <th>Días</th>
              <th>Precio</th>
            </tr>
          </thead>

          <tbody>
            <tr>
              <td>Purmamarca</td>
              <td>3</td>
              <td>$150.000</td>
            </tr>

            <tr>
              <td>Tilcara</td>
              <td>2</td>
              <td>$120.000</td>
            </tr>

            <tr>
              <td>Salinas</td>
              <td>4</td>
              <td>$200.000</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <script src="script.js"></script>
